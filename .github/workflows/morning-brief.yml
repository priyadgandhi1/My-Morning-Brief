name: Morning Brief

# This workflow is triggered on a fixed schedule by an external scheduler that
# calls the workflow_dispatch API (see docs/RELIABLE_TRIGGER.md). We do not use
# GitHub's `schedule:` cron here on purpose: scheduled runs are best-effort and
# get queued behind heavy load, so the brief would arrive hours late and at a
# different time every day. An external trigger fires at the same minute daily.
on:
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brief.py
